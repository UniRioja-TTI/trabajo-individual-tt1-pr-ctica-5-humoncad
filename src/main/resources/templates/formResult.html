<body>
<div th:if="${token != null}">
	<p>Su solicitud se ha realizado. Token:</p>
	<h1 th:text="${token}"></h1>
	<p><a th:href="@{/grid(tok=${token})}">Ver resultados de la simulación</a></p>
</div>

<div th:if="${errors != null}" style="color: red;">
	<h3>Errores en la solicitud:</h3>
	<ul>
		<li th:each="err : ${errors}" th:text="${err}"></li>
	</ul>
	<a href="/solicitud">Volver a intentar</a>
</div>

<p th:if="${mensajeError != null}" th:text="${mensajeError}" style="color: orange;"></p>
</body>
